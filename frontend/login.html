<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Natural Milk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">

  <div class="auth-container">
    <h1 class="logo">NATURAL MILK</h1>
    <h2 class="auth-title">Login to Your Account</h2>

    <form id="loginForm" class="auth-form">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit" class="btn primary" id="loginSubmitBtn">Login</button>
    </form>

    <p class="auth-footer">
      Don’t have an account? <a href="signup.html">Sign up</a>
    </p>

    <button class="btn outline" onclick="window.location.href='index.html'">← Go Home</button>
  </div>

  <script src="config.js"></script>
  <script>
    const API_BASE = (window.APP_CONFIG && window.APP_CONFIG.API_BASE)
      ? window.APP_CONFIG.API_BASE
      : "http://localhost:4000/api";

    const form = document.getElementById("loginForm");
    const submitBtn = document.getElementById("loginSubmitBtn");
    const params = new URLSearchParams(window.location.search);
    const nextPage = params.get("next");

    async function fetchWithTimeout(url, options = {}, timeoutMs = 20000) {
      const controller = new AbortController();
      const timeoutId = window.setTimeout(() => controller.abort(), timeoutMs);
      try {
        return await fetch(url, { ...options, signal: controller.signal });
      } finally {
        window.clearTimeout(timeoutId);
      }
    }

    const wait = (ms) => new Promise((resolve) => window.setTimeout(resolve, ms));

    async function loginWithRetry(payload) {
      const maxAttempts = 3;
      let lastError = null;

      for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
        try {
          if (attempt > 1) {
            submitBtn.textContent = `Trying again (${attempt}/${maxAttempts})...`;
          }

          return await fetchWithTimeout(`${API_BASE}/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          }, 18000);
        } catch (err) {
          lastError = err;
          if (attempt < maxAttempts) {
            await wait(900);
            continue;
          }
        }
      }

      throw lastError || new Error("Login failed");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        submitBtn.disabled = true;
        submitBtn.textContent = "Signing in...";
        const res = await loginWithRetry({ email, password });

        const data = await res.json();
        if (res.ok) {
          localStorage.setItem("token", data.token);
          window.location.href = (nextPage && !nextPage.startsWith("http")) ? nextPage : "index.html";
        } else {
          alert(data.message || "Login failed");
        }
      } catch (_err) {
        alert("Unable to sign in right now. Please try again.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Login";
      }
    });
  </script>
</body>
</html>
