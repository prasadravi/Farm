<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Natural Milk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">

  <div class="auth-container">
    <h1 class="logo">NATURAL MILK</h1>
    <h2 class="auth-title">Login to Your Account</h2>

    <div id="errorMessage" class="error-message" style="display:none;"></div>

    <form id="loginForm" class="auth-form">
      <input type="email" id="email" placeholder="Email" required />
      <div class="password-field">
        <input type="password" id="password" placeholder="Password" required />
        <button type="button" class="password-toggle" id="togglePassword" aria-label="Show password" aria-pressed="false">👁</button>
      </div>
      <button type="submit" class="btn primary" id="loginSubmitBtn">Login</button>
    </form>

    <p class="auth-footer">
      Don’t have an account? <a href="signup.html">Sign up</a>
    </p>

    <button class="btn outline" onclick="window.location.href='index.html'">← Go Home</button>
  </div>

  <script src="config.js"></script>
  <script>
    const API_BASE = (window.APP_CONFIG && window.APP_CONFIG.API_BASE)
      ? window.APP_CONFIG.API_BASE
      : "http://localhost:4000/api";

    const form = document.getElementById("loginForm");
    const submitBtn = document.getElementById("loginSubmitBtn");
    const passwordInput = document.getElementById("password");
    const togglePassword = document.getElementById("togglePassword");
    const errorMessage = document.getElementById("errorMessage");
    const params = new URLSearchParams(window.location.search);
    const nextPage = params.get("next");

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.style.display = "block";
    }

    function hideError() {
      errorMessage.style.display = "none";
    }

    async function fetchWithTimeout(url, options = {}, timeoutMs = 10000) {
      const controller = new AbortController();
      const timeoutId = window.setTimeout(() => controller.abort(), timeoutMs);
      try {
        return await fetch(url, { ...options, signal: controller.signal });
      } finally {
        window.clearTimeout(timeoutId);
      }
    }

    togglePassword.addEventListener("click", () => {
      const isHidden = passwordInput.type === "password";
      passwordInput.type = isHidden ? "text" : "password";
      togglePassword.textContent = isHidden ? "🙈" : "👁";
      togglePassword.setAttribute("aria-label", isHidden ? "Hide password" : "Show password");
      togglePassword.setAttribute("aria-pressed", String(isHidden));
    });

    async function loginOnce(email, password) {
      try {
        const res = await fetchWithTimeout(`${API_BASE}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
          cache: "no-store"
        }, 20000);

        const data = await res.json();
        if (res.ok) {
          localStorage.setItem("token", data.token);
          window.location.href = (nextPage && !nextPage.startsWith("http")) ? nextPage : "index.html";
          return true;
        }

        showError(data.message || "Invalid email or password");
        return false;
      } catch (err) {
        showError("Unable to sign in. Please check your connection.");
        return false;
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (submitBtn.disabled) return;

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        showError("Please enter email and password");
        return;
      }

      hideError();
      try {
        submitBtn.disabled = true;
        submitBtn.textContent = "Signing in...";
        await loginOnce(email, password);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Login";
      }
    });
  </script>
</body>
</html>
