<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Success - Natural Milk</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #fbfaf6 0%, #ffffff 100%);
      font-family: 'Poppins', sans-serif;
      color: #111827;
    }
    .success-card {
      width: min(92vw, 420px);
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 28px 22px;
      background: #fff;
      text-align: center;
      box-shadow: 0 10px 28px rgba(17, 24, 39, 0.08);
    }
    .success-title {
      margin: 0 0 8px;
      font-size: 1.25rem;
      font-weight: 700;
    }
    .success-copy {
      margin: 0 0 18px;
      color: #4b5563;
      font-size: 0.95rem;
    }
    .success-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: #111827;
      color: #fff;
      text-decoration: none;
      padding: 10px 16px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="success-card">
    <h1 class="success-title">Order placed successfully</h1>
    <p class="success-copy">Thank you ordering my products</p>
    <a class="success-btn" href="index.html#store">Back to Store</a>
  </main>
</body>
</html>
