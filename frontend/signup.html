<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - Natural Milk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">

  <div class="auth-container">
    <h1 class="logo">NATURAL MILK</h1>
    <h2 class="auth-title">Create an Account</h2>

    <div id="errorMessage" class="error-message" style="display:none;"></div>

    <form id="signupForm" class="auth-form">
      <input type="text" id="name" placeholder="Full Name" required />
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit" class="btn primary" id="signupSubmitBtn">Sign Up</button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="login.html">Login</a>
    </p>

    <button class="btn outline" onclick="window.location.href='index.html'">← Go Home</button>
  </div>

  <script src="config.js"></script>
  <script>
    const API_BASE = (window.APP_CONFIG && window.APP_CONFIG.API_BASE)
      ? window.APP_CONFIG.API_BASE
      : "http://localhost:4000/api";

    const form = document.getElementById("signupForm");
    const submitBtn = document.getElementById("signupSubmitBtn");
    const errorMessage = document.getElementById("errorMessage");

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.style.display = "block";
    }

    function hideError() {
      errorMessage.style.display = "none";
    }

    async function fetchWithTimeout(url, options = {}, timeoutMs = 10000) {
      const controller = new AbortController();
      const timeoutId = window.setTimeout(() => controller.abort(), timeoutMs);
      try {
        return await fetch(url, { ...options, signal: controller.signal });
      } finally {
        window.clearTimeout(timeoutId);
      }
    }

    async function signupOnce(name, email, password) {
      try {
        const res = await fetchWithTimeout(`${API_BASE}/auth/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password }),
          cache: "no-store"
        }, 20000);

        const data = await res.json();
        if (res.ok) {
          // Show success message and redirect
          setTimeout(() => {
            window.location.href = "login.html";
          }, 500);
          return true;
        }

        showError(data.message || "Signup failed");
        return false;
      } catch (err) {
        showError("Unable to sign up. Please check your connection.");
        return false;
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (submitBtn.disabled) return;

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!name || !email || !password) {
        showError("Please fill all fields");
        return;
      }

      hideError();
      try {
        submitBtn.disabled = true;
        submitBtn.textContent = "Creating...";
        await signupOnce(name, email, password);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Sign Up";
      }
    });
  </script>
</body>
</html>
