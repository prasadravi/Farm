<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - Natural Milk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">

  <div class="auth-container">
    <h1 class="logo">NATURAL MILK</h1>
    <h2 class="auth-title">Create an Account</h2>

    <form id="signupForm" class="auth-form">
      <input type="text" id="name" placeholder="Full Name" required />
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit" class="btn primary" id="signupSubmitBtn">Sign Up</button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="login.html">Login</a>
    </p>

    <button class="btn outline" onclick="window.location.href='index.html'">← Go Home</button>
  </div>

  <script src="config.js"></script>
  <script>
    const API_BASE = (window.APP_CONFIG && window.APP_CONFIG.API_BASE)
      ? window.APP_CONFIG.API_BASE
      : "http://localhost:4000/api";

    const form = document.getElementById("signupForm");
    const submitBtn = document.getElementById("signupSubmitBtn");

    async function fetchWithTimeout(url, options = {}, timeoutMs = 10000) {
      const controller = new AbortController();
      const timeoutId = window.setTimeout(() => controller.abort(), timeoutMs);
      try {
        return await fetch(url, { ...options, signal: controller.signal });
      } finally {
        window.clearTimeout(timeoutId);
      }
    }

    // Warm up backend once using a public lightweight endpoint.
    fetchWithTimeout(`${API_BASE}/auth/health`, {
      method: "GET",
      cache: "no-store",
      keepalive: true
    }, 4000).catch(() => {});

    async function signupWithRetry(name, email, password, maxAttempts = 3) {
      for (let attempt = 1; attempt <= maxAttempts; attempt++) {
        try {
          // Exponential backoff timeout: 15s, 20s, 25s for retries
          const baseTimeout = 15000;
          const timeoutMs = baseTimeout + (attempt - 1) * 5000;
          
          const res = await fetchWithTimeout(`${API_BASE}/auth/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, password }),
            cache: "no-store"
          }, timeoutMs);

          const data = await res.json();
          if (res.ok) {
            alert("Signup successful! Please log in.");
            window.location.href = "login.html";
            return true;
          } else {
            // Non-timeout error, don't retry
            alert(data.message || "Signup failed");
            return false;
          }
        } catch (err) {
          if (attempt === maxAttempts) {
            // Last attempt failed
            alert("Unable to sign up right now. Please check your connection and try again.");
            return false;
          }
          // Retry with increased timeout
          submitBtn.textContent = `Creating (Attempt ${attempt + 1}/${maxAttempts})...`;
        }
      }
      return false;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (submitBtn.disabled) return;

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!name || !email || !password) {
        alert("Please fill all fields");
        return;
      }

      try {
        submitBtn.disabled = true;
        submitBtn.textContent = "Creating...";
        await signupWithRetry(name, email, password);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Sign Up";
      }
    });
  </script>
</body>
</html>
