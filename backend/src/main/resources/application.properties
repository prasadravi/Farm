spring.application.name=natural-milk-backend
server.port=${PORT:4000}
server.servlet.context-path=/api

# Logging
logging.level.root=INFO
logging.level.com.naturalmilk=DEBUG

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8000,http://localhost:8080,file://}
spring.web.cors.allowed-methods=*
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Firebase
firebase.credentials=src/main/resources/firebase-service-account.json
firebase.credentials.json=${FIREBASE_CREDENTIALS_JSON:}
firebase.credentials.base64=${FIREBASE_CREDENTIALS_BASE64:}
firebase.database-url=${FIREBASE_DATABASE_URL:https://fram-bc35f.firebaseio.com}

# JWT
jwt.secret=${JWT_SECRET:mySecretJWTKeyForNaturalMilkApp2026WithMinimum512BitsForHS512AlgorithmSecurityRequirement1234567890}
jwt.expiration=86400000
