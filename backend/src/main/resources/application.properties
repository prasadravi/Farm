spring.application.name=natural-milk-backend
server.port=${PORT:4000}
server.servlet.context-path=/api

# Logging
logging.level.root=INFO
logging.level.com.naturalmilk=DEBUG

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8000,http://localhost:8080,http://localhost,https://localhost,file://,capacitor://localhost,ionic://localhost,https://*.onrender.com}
spring.web.cors.allowed-methods=*
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true


# JWT
jwt.secret=${JWT_SECRET:mySecretJWTKeyForNaturalMilkApp2026WithMinimum512BitsForHS512AlgorithmSecurityRequirement1234567890}
jwt.expiration=86400000

# Razorpay
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}

# PostgreSQL (Neon)
spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
