spring.application.name=natural-milk-backend
server.port=${PORT:4000}
server.servlet.context-path=/api

# Logging
logging.level.root=INFO
logging.level.com.naturalmilk=DEBUG

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8000,http://localhost:8080,http://localhost,https://localhost,file://,capacitor://localhost,ionic://localhost,https://*.onrender.com}
spring.web.cors.allowed-methods=*
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Frontend
app.frontend.base-url=${FRONTEND_BASE_URL:https://natural-milk-frontend.onrender.com}


# JWT
jwt.secret=${JWT_SECRET:mySecretJWTKeyForNaturalMilkApp2026WithMinimum512BitsForHS512AlgorithmSecurityRequirement1234567890}
jwt.expiration=86400000

# Razorpay
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}

# Admin
admin.username=${ADMIN_USERNAME:prasad@gmail.com}
admin.password=${ADMIN_PASSWORD:123456789}

# PostgreSQL (Neon)
spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Configuration (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.auto-commit=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
