<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - Natural Milk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/admin/admin.css}" />
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-brand">Natural Milk</div>
      <nav>
        <a class="active" th:href="@{/admin/dashboard}">Dashboard</a>
        <a th:href="@{/admin/products}">Products</a>
        <a th:href="@{/admin/orders}">Orders</a>
        <a th:href="@{/admin/settings}">Settings</a>
        <a class="logout" th:href="@{/admin/logout}">Logout</a>
      </nav>
    </aside>
    <main class="admin-main">
      <header class="admin-header">
        <h1>Dashboard</h1>
        <p>Overview of your store performance</p>
      </header>
      <section class="admin-cards">
        <div class="admin-card">
          <h3>Total Products</h3>
          <div class="admin-card-value" th:text="${totalProducts}">0</div>
        </div>
        <div class="admin-card">
          <h3>Total Orders</h3>
          <div class="admin-card-value" th:text="${totalOrders}">0</div>
        </div>
        <div class="admin-card">
          <h3>Total Revenue</h3>
          <div class="admin-card-value">₹<span th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 2, 'POINT')}">0.00</span></div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
