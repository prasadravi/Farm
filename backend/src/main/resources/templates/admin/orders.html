<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Orders - Natural Milk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/admin/admin.css}" />
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-brand">Natural Milk</div>
      <nav>
        <a th:href="@{/admin/dashboard}">Dashboard</a>
        <a th:href="@{/admin/products}">Products</a>
        <a class="active" th:href="@{/admin/orders}">Orders</a>
        <a th:href="@{/admin/settings}">Settings</a>
        <a class="logout" th:href="@{/admin/logout}">Logout</a>
      </nav>
    </aside>
    <main class="admin-main">
      <header class="admin-header">
        <h1>Orders</h1>
        <p>Track and update order status</p>
      </header>

      <section class="admin-card">
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Address</th>
                <th>Amount</th>
                <th>Payment</th>
                <th>Status</th>
                <th>Update</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="order : ${orders}">
                <td th:text="${order.id}">-</td>
                <td th:text="${order.userId}">-</td>
                <td>
                  <div th:text="${order.address}">-</div>
                  <div class="admin-subtext" th:text="${'Landmark: ' + (order.landmark ?: '-') + ' | Pin: ' + (order.pincode ?: '-') + ' | Phone: ' + (order.phone ?: '-')}"></div>
                </td>
                <td>₹<span th:text="${#numbers.formatDecimal(order.total, 0, 'COMMA', 2, 'POINT')}">0.00</span></td>
                <td th:text="${order.payment != null ? order.payment.status : 'NA'}">NA</td>
                <td>
                  <span class="status-pill" th:text="${order.status}">pending</span>
                </td>
                <td>
                  <form th:action="@{'/admin/orders/' + ${order.id} + '/status'}" method="post" class="inline-form">
                    <select name="status">
                      <option value="pending" th:selected="${order.status == 'pending'}">Pending</option>
                      <option value="paid" th:selected="${order.status == 'paid'}">Paid</option>
                      <option value="delivered" th:selected="${order.status == 'delivered'}">Delivered</option>
                    </select>
                    <button type="submit">Save</button>
                  </form>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(orders)}">
                <td colspan="7" class="empty">No orders found.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
