<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Settings - Natural Milk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/admin/admin.css}" />
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-brand">Natural Milk</div>
      <nav>
        <a th:href="@{/admin/dashboard}">Dashboard</a>
        <a th:href="@{/admin/products}">Products</a>
        <a th:href="@{/admin/orders}">Orders</a>
        <a class="active" th:href="@{/admin/settings}">Settings</a>
        <a class="logout" th:href="@{/admin/logout}">Logout</a>
      </nav>
    </aside>
    <main class="admin-main">
      <header class="admin-header">
        <h1>Admin Settings</h1>
        <p>Update your login details</p>
      </header>

      <section class="admin-card">
        <div class="admin-alert" th:if="${error}" th:text="${error}"></div>
        <div class="admin-alert success" th:if="${message}" th:text="${message}"></div>
        <form class="admin-form" th:action="@{/admin/settings}" method="post">
          <div class="form-grid">
            <div>
              <label>Email (Username)</label>
              <input type="email" name="username" th:value="${username}" required />
            </div>
            <div>
              <label>New Password</label>
              <input type="password" name="password" placeholder="Leave blank to keep" />
            </div>
            <div>
              <label>Confirm Password</label>
              <input type="password" name="confirmPassword" placeholder="Re-enter new password" />
            </div>
          </div>
          <button type="submit">Save Changes</button>
        </form>
      </section>
    </main>
  </div>
</body>
</html>
