services:
  - type: web
    name: natural-milk-backend
    rootDir: backend
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: JAVA_VERSION
        value: 17
      - key: JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

  - type: web
    name: natural-milk-frontend
    rootDir: frontend
    env: static
    buildCommand: ""
    staticPublishPath: .