services:
  - type: web
    name: natural-milk-backend
    rootDir: backend
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: JAVA_VERSION
        value: 17
      - key: JWT_SECRET
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: FIREBASE_DATABASE_URL
        value: https://fram-bc35f.firebaseio.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  - type: web
    name: natural-milk-frontend
    rootDir: frontend
    env: static
    buildCommand: ""
    staticPublishPath: .